trigger:
 branches:
   include:
     - main
     - feature

pool:  prod-pool

parameters:
  - name:  environment
    type:  string
    default: dev
    values:
      - qa
      - prod

stages:
  - stage: FirstStage
    displayName: terraformfmt
    jobs:
      - job: fmt
        steps:
          - task: TerraformInstaller@1
            inputs:
              terraformVersion: 'latest'

          - task: PowerShell@2
            inputs:
              targetType: 'inline'
              script: |
                terraform version
                
                terraform fmt -check -recursive